<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐỀ SỐ 61 - MÔN LỊCH SỬ</title>
<style>
  :root{
    --navy:#1b2432;
    --navy-2:#232e40;
    --yellow:#f4c531;
    --pink:#b6579a;
    --blue:#4a6fa5;
    --green:#3fae5a;
    --red:#d9534f;
    --text:#f2f2f2;
    --muted:#c7cdd6;
    --bg-outer:#c6de2a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-outer);
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  #app{
    width:100%;
    max-width:760px;
    background:var(--navy);
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    background:var(--navy);
    padding:22px 20px 14px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:5;
  }
  header h1{
    color:var(--text);
    font-size:1.35rem;
    letter-spacing:0.5px;
    margin:0 0 4px;
    font-weight:800;
  }
  header .subtitle{
    color:var(--muted);
    font-size:0.85rem;
    margin:0 0 14px;
  }
  .timer-bar{
    background:var(--yellow);
    color:#1b2432;
    font-weight:700;
    border-radius:8px;
    padding:10px 14px;
    font-size:0.95rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .progress-wrap{
    padding:10px 20px 0;
  }
  .progress-track{
    background:#2c3648;
    border-radius:6px;
    height:8px;
    overflow:hidden;
  }
  .progress-fill{
    background:var(--green);
    height:100%;
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{
    color:var(--muted);
    font-size:0.8rem;
    margin:6px 2px 0;
    text-align:right;
  }
  main{
    padding:16px 16px 8px;
  }
  .section-title{
    color:var(--yellow);
    font-size:1.05rem;
    font-weight:800;
    margin:22px 4px 12px;
    padding-top:6px;
    border-top:1px solid #33405a;
  }
  .section-title:first-child{
    border-top:none;
    margin-top:4px;
  }
  .qcard{
    background:var(--pink);
    border-radius:14px;
    padding:16px 18px 20px;
    margin-bottom:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
  }
  .qcard h3{
    color:#fff;
    margin:0 0 14px;
    font-size:1.02rem;
    font-weight:700;
    line-height:1.45;
  }
  .qcard .qnum{
    opacity:0.85;
    font-weight:700;
  }
  .option{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.18);
    border-radius:10px;
    padding:10px 8px;
    margin-bottom:8px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
    user-select:none;
  }
  .option:hover{
    background:rgba(255,255,255,0.1);
    border-color:rgba(255,255,255,0.4);
  }
  .option.selected{
    background:rgba(244,197,49,0.22);
    border-color:var(--yellow);
    box-shadow:0 0 0 1px var(--yellow) inset;
  }
  .option.selected span{ font-weight:700; }
  .option input{
    accent-color:#fff;
    width:18px;
    height:18px;
    flex-shrink:0;
    pointer-events:none;
    margin-top:2px;
    align-self:flex-start;
  }
  .option span{
    color:#fdfdfd;
    font-size:0.95rem;
    line-height:1.4;
  }
  .option.correct{
    background:rgba(63,174,90,0.35);
    border-color:var(--green);
    box-shadow:0 0 0 1px var(--green) inset;
  }
  .option.wrong{
    background:rgba(217,83,79,0.35);
    border-color:var(--red);
    box-shadow:0 0 0 1px var(--red) inset;
  }
  .option.disabled{ cursor:default; }

  .explain-box{
    display:none;
    margin-top:10px;
    background:rgba(0,0,0,0.18);
    border-radius:8px;
    padding:10px 12px;
    color:#fff0f7;
    font-size:0.85rem;
    line-height:1.5;
  }
  .explain-box.show{ display:block; }
  .explain-box b{ color:var(--yellow); }

  .tf-card{
    background:var(--blue);
    border-radius:14px;
    padding:16px 18px 20px;
    margin-bottom:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
  }
  .tf-card .context{
    color:#eef2fa;
    background:rgba(0,0,0,0.18);
    border-radius:8px;
    padding:10px 12px;
    font-size:0.85rem;
    line-height:1.55;
    white-space:pre-line;
    margin-bottom:14px;
    font-style:italic;
  }
  .tf-item{
    background:rgba(255,255,255,0.06);
    border:2px solid rgba(255,255,255,0.18);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:10px;
  }
  .tf-item .tf-text{
    color:#fff;
    font-size:0.93rem;
    line-height:1.45;
    margin-bottom:8px;
  }
  .tf-buttons{
    display:flex;
    gap:8px;
  }
  .tf-btn{
    flex:1;
    text-align:center;
    padding:8px 6px;
    border-radius:8px;
    border:2px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.05);
    color:#fff;
    font-weight:700;
    font-size:0.85rem;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .tf-btn:hover{ background:rgba(255,255,255,0.12); }
  .tf-btn.selected{
    background:rgba(244,197,49,0.28);
    border-color:var(--yellow);
  }
  .tf-btn.correct{
    background:rgba(63,174,90,0.4);
    border-color:var(--green);
  }
  .tf-btn.wrong{
    background:rgba(217,83,79,0.4);
    border-color:var(--red);
  }
  .tf-btn.disabled{ cursor:default; }

  #result-bar{
    position:sticky;
    bottom:0;
    background:var(--navy-2);
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:1px solid #33405a;
    gap:10px;
    flex-wrap:wrap;
  }
  #result-bar .score{
    color:var(--yellow);
    font-weight:800;
    font-size:0.95rem;
    line-height:1.4;
  }
  #submit-btn{
    background:var(--yellow);
    border:none;
    color:#1b2432;
    font-weight:800;
    padding:10px 22px;
    border-radius:8px;
    font-size:0.95rem;
    cursor:pointer;
  }
  #submit-btn:disabled{ opacity:0.5; cursor:default; }
  #restart-btn{
    display:none;
    background:var(--navy-2);
    color:var(--text);
    border:1px solid var(--yellow);
    padding:10px 22px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
  }
  .snowflake{
    position:absolute;
    top:-10%;
    color:rgba(255,255,255,0.35);
    pointer-events:none;
    font-size:14px;
    animation-name:snowfall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
    will-change:transform;
  }
  @keyframes snowfall{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); }
    25%{ transform:translateY(25vh) translateX(12px) rotate(90deg); }
    50%{ transform:translateY(55vh) translateX(-10px) rotate(180deg); }
    75%{ transform:translateY(80vh) translateX(14px) rotate(270deg); }
    100%{ transform:translateY(115vh) translateX(0) rotate(360deg); }
  }
  #snow-layer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
</style>
</head>
<body>
<div id="snow-layer"></div>
<div id="app">
  <header>
    <h1>GIẢI ĐỀ SỐ 61 - MÔN LỊCH SỬ</h1>
    <div class="subtitle">Kỳ thi thử Tốt nghiệp THPT 2025 - 2026</div>
    <div class="timer-bar">⏱ Thời gian làm bài: <span id="timer">45:00</span></div>
  </header>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0/40 đã trả lời</div>
  </div>
  <main id="quiz"></main>
  <div id="result-bar">
    <div>
      <div class="score" id="scoreLabel">Điểm: Phần I 0/24 · Phần II 0/16 · Tổng 0/40</div>
      <div id="emailStatus" style="font-size:0.78rem;color:#c7cdd6;margin-top:4px;"></div>
    </div>
    <div>
      <button id="submit-btn">Nộp bài</button>
      <button id="restart-btn">Làm lại</button>
    </div>
  </div>
</div>
<script>
const PART1 = [{"q": "Đầu thế kỉ XX, Phan Bội Châu chọn Nhật Bản làm điểm đến cầu viện đầu tiên trong hoạt động đối ngoại vì một trong những lí do nào?", "options": ["Nhật Bản cam kết viện trợ vũ khí và tài chính vô điều kiện cho nhân dân Việt Nam.", "Nhật Bản đang có mâu thuẫn gay gắt và chuẩn bị tuyên chiến với nước Pháp.", "Nhật Bản là nước “đồng văn, đồng chủng” và đã vươn lên cường thịnh sau Duy tân.", "Nhật Bản là quốc gia duy nhất ở châu Á đi theo con đường cách mạng vô sản."], "correct": 2, "explain": "Nhật Bản “đồng văn, đồng chủng”, đã canh tân (Duy tân Minh Trị) và vươn lên cường thịnh → điểm tựa để Phan Bội Châu cầu viện."}, {"q": "Sau cuộc chiến đấu chống thù trong giặc ngoài, công cuộc xây dựng chủ nghĩa xã hội đặt ra yêu cầu nào sau đây đối với các dân tộc trên lãnh thổ nước Nga Xô viết?", "options": ["Độc lập với nhau để phát huy sức mạnh của mỗi dân tộc.", "Liên minh, đoàn kết với nhau nhằm tăng cường sức mạnh.", "Liên kết với các nước lớn bên ngoài để nhận sự giúp đỡ.", "Gia nhập vào liên minh quân sự để tăng cường sức mạnh."], "correct": 1, "explain": "Sau nội chiến, các dân tộc trên đất Nga cần liên minh, đoàn kết để tăng sức mạnh, dẫn tới thành lập Liên Xô (1922)."}, {"q": "Nội dung nào dưới đây không phản ánh đúng thành tựu của Việt Nam trong công cuộc Đổi mới từ đất nước năm 1986 đến nay?", "options": ["Cơ cấu kinh tế có sự chuyển dịch theo hướng tăng các ngành công nghiệp, dịch vụ.", "Nền kinh tế chuyển dịch theo hướng hiện đại hoá, đa ngành, đa thành phần kinh tế.", "Xuất hiện các thành phần kinh tế mới trên nền tảng kinh tế kế hoạch hóa tập trung.", "Hạ tầng phục vụ cho sản xuất, kinh doanh ngày càng phát triển đồng bộ, hiện đại."], "correct": 2, "explain": "Đổi mới là chuyển từ kinh tế kế hoạch hóa tập trung sang kinh tế thị trường, không phải “trên nền tảng” kế hoạch hóa tập trung."}, {"q": "Tháng 8-1979, Hội nghị Trung ương 6 (khóa IV) chủ trương làm cho sản xuất “bung ra”; Tháng 1-1981, Ban Bí thư ban hành Chỉ thị 100 về khoán sản phẩm trong nông nghiệp; Tháng 6-1985, Hội nghị Trung ương 8 (khóa V) chủ trương xóa bỏ cơ chế tập trung quan liêu, bao cấp về giá - lương - tiền. Những sự kiện trên là minh chứng cho quá trình nào sau đây của Đảng Cộng sản Việt Nam?", "options": ["Quá trình tư nhân hóa toàn bộ hệ thống doanh nghiệp nhà nước nhằm giải quyết lạm phát.", "Quá trình tìm tòi, thử nghiệm và từng bước tháo gỡ điểm nghẽn về tư duy quản lý kinh tế.", "Quá trình áp dụng triệt để mô hình kinh tế kế hoạch hóa để vượt qua khủng hoảng xã hội.", "Quá trình mở cửa hoàn toàn nền kinh tế thị trường để thu hút nguồn vốn đầu tư quốc tế."], "correct": 1, "explain": "Các mốc trên là quá trình tìm tòi, thử nghiệm, tháo gỡ tư duy quản lý kinh tế trước khi đổi mới toàn diện (1986)."}, {"q": "Năm 1976, việc ký kết Hiệp ước Thân thiện và Hợp tác ở Đông Nam Á phản ánh nhu cầu nào của các quốc gia thành viên ASEAN?", "options": ["Xây dựng môi trường hòa bình, ổn định để phát triển.", "Đối phó với sự phát triển của xu thế toàn cầu hóa.", "Thiết lập liên minh quân sự chung của toàn khu vực.", "Phân chia phạm vi ảnh hưởng giữa các nước lớn."], "correct": 0, "explain": "Hiệp ước Bali (1976) nhằm xây dựng môi trường hòa bình, ổn định cho khu vực."}, {"q": "Nhận xét nào sau đây là đúng về cuộc Tổng khởi nghĩa tháng Tám năm 1945 ở Việt Nam?", "options": ["Diễn ra gấp rút để nhằm đẩy lùi những nguy cơ lớn đối với cách mạng Việt Nam.", "Diễn ra trên mọi địa bàn, khởi nghĩa ở nông thôn đóng vai trò quyết định thắng lợi.", "Diễn ra nhanh chóng trong điều kiện hoàn toàn có lợi cho cách mạng Việt Nam.", "Diễn ra lâu dài do không có sự lãnh đạo thống nhất của một chính đảng cách mạng."], "correct": 0, "explain": "Tổng khởi nghĩa tháng Tám diễn ra gấp rút để chớp thời cơ, đẩy lùi nguy cơ (Nhật đầu hàng, Đồng minh sắp vào, Pháp lăm le quay lại)."}, {"q": "Nội dung nào sau đây phản ánh đúng một trong những tác động của Hội nghị I-an-ta (2-1945) đến tình hình thế giới?", "options": ["Làm cho quan hệ giữa hai khối nước đế quốc bắt đầu căng thẳng.", "Góp phần thúc đẩy thất bại của quân đội Phát xít trên chiến trường.", "Dẫn tới sự ra đời của các tổ chức liên kết kinh tế toàn cầu đầu tiên.", "Mở đầu cho sự phát triển của xu thế toàn cầu hóa sau chiến tranh."], "correct": 0, "explain": "Trật tự Ianta hình thành hai phe, quan hệ hai khối đế quốc dần căng thẳng, mở đầu Chiến tranh lạnh."}, {"q": "Những thành tựu trong công cuộc xây dựng đất nước ở các nước xã hội chủ nghĩa từ những năm 90 của thế kỉ XX có ý nghĩa nào sau đây?", "options": ["Góp phần thúc đẩy sự phát triển của văn minh nhân loại.", "Đưa chủ nghĩa xã hội trở thành hệ thống trên thế giới.", "Thu hẹp phạm vi thống trị của hệ thống tư bản chủ nghĩa.", "Thúc đẩy mạnh mẽ cuộc đấu tranh giải phóng dân tộc."], "correct": 0, "explain": "Thành tựu xây dựng CNXH góp phần vào sự phát triển chung của văn minh nhân loại."}, {"q": "Nhận xét nào sau đây đúng về cuộc kháng chiến chống Tống (1075 - 1077) của nhà Lý?", "options": ["Rút lui khỏi kinh thành Thăng Long để bảo toàn lực lượng.", "Hành quân thần tốc để tiêu diệt đạo quân tiếp viện nhà Tống.", "Chủ động kết thúc chiến tranh bằng cách đề nghị giảng hoà.", "Xây dựng tuyến phòng thủ vững chắc trên sông Bạch Đằng."], "correct": 2, "explain": "Lý Thường Kiệt chủ động giảng hòa, kết thúc chiến tranh trong thế thắng để giữ hòa hiếu lâu dài."}, {"q": "Nhận định nào sau đây đúng về mục tiêu của tổ chức Liên hợp quốc?", "options": ["Mang tính bao quát, phản ánh mối quan tâm toàn diện của các nước.", "Mang tính toàn diện, thay đổi theo mối quan hệ giữa Mỹ và Liên Xô.", "Thúc đẩy mối quan hệ hữu nghị giữa các dân tộc là mục tiêu cao nhất.", "Mục tiêu được hình thành sau kết nạp đầy đủ thành viên vào tổ chức."], "correct": 0, "explain": "Mục tiêu LHQ mang tính bao quát, phản ánh mối quan tâm toàn diện (hòa bình, an ninh, hợp tác, nhân quyền...)."}, {"q": "Cuộc chiến tranh bảo vệ biên giới Tây Nam (1975 – 1979) của quân dân Việt Nam đã", "options": ["góp phần thể hiện quyết tâm trong việc bảo vệ thành quả của cách mạng.", "xoá bỏ chủ nghĩa dân tộc cực đoan của Pôn Pốt ngay khi còn ở Việt Nam.", "góp phần xóa bỏ được hoàn toàn chủ nghĩa thực dân mới trên toàn thế giới.", "chứng tỏ sự lãnh đạo đúng đắn, sáng tạo của Đảng Cộng sản Đông Dương."], "correct": 0, "explain": "Bảo vệ biên giới Tây Nam thể hiện quyết tâm bảo vệ thành quả cách mạng, chủ quyền lãnh thổ."}, {"q": "Từ sau Chiến tranh lạnh, hầu hết các quốc gia điều chỉnh chiến lược phát triển lấy kinh tế làm trọng điểm vì một trong những lí do nào sau đây?", "options": ["Sức mạnh của các nước chỉ dựa trên sức mạnh về kinh tế.", "Hòa bình và an ninh thế giới được bảo vệ ở mức cao nhất.", "Các cường quốc đã chấm dứt hoàn toàn chạy đua vũ trang.", "Kinh tế trở thành nội dung căn bản trong quan hệ quốc tế."], "correct": 3, "explain": "Sau Chiến tranh lạnh, kinh tế trở thành nội dung căn bản trong quan hệ quốc tế."}, {"q": "Phong trào “Đồng khởi” (1959-1960) ở miền Nam Việt Nam đã làm lung lay tận gốc chính quyền tay sai Ngô Đình Diệm vì", "options": ["nhân dân miền Nam Việt Nam đã phá vỡ mảng lớn “Ấp chiến lược”.", "bước đầu làm phá sản chiến thuật “trực thăng vận”, “thiết xa vận”.", "Quân Giải phóng đã tiêu diệt phần lớn lực lượng quân đội tay sai.", "cách mạng đã kiểm soát được mảng lớn chính quyền cấp thôn xã."], "correct": 3, "explain": "Đồng khởi giúp cách mạng giành quyền làm chủ ở nhiều thôn xã, làm tan rã hệ thống chính quyền cơ sở của Diệm."}, {"q": "Việc Việt Nam thiết lập đối tác với 5 nước Ủy viên Thường trực Hội đồng Bảo an Liên hợp quốc chứng tỏ điều nào sau đây?", "options": ["Vị thế địa chiến lược và mức độ tin cậy chính trị của Việt Nam được nâng cao.", "Việt Nam đã tham gia vào Hội đồng Bảo an với tư cách là ủy viên thường trực.", "Việt Nam đã quyết định từ bỏ tư cách thành viên của tổ chức hợp tác ASEAN.", "Sự chi phối của 5 nước Ủy viên Thường trực Hội đồng Bảo an Liên hợp quốc."], "correct": 0, "explain": "Thiết lập quan hệ đối tác với cả 5 nước ủy viên thường trực HĐBA cho thấy vị thế, độ tin cậy chính trị của Việt Nam được nâng cao."}, {"q": "Nội dung nào sau đây không phải là thách thức của Cộng đồng ASEAN?", "options": ["Tình hình ô nhiễm môi trường và biến đổi khí hậu gia tăng.", "Sự chênh lệch trình độ phát triển giữa các nước thành viên.", "Chưa có sự hợp tác chặt chẽ trong lĩnh vực kinh tế, xã hội.", "Sự khác biệt về chế độ chính trị giữa các nước thành viên."], "correct": 2, "explain": "Đây là điểm mạnh chứ không phải thách thức; các thách thức thật sự là A, B, D."}, {"q": "Ở Việt Nam, thực tiễn cuộc Cách mạng tháng Tám (1945) và hai cuộc kháng chiến chống ngoại xâm (1945-1975) đều", "options": ["được tiến hành trong khi đất nước đã có độc lập và chủ quyền.", "có sự kết hợp giữa chiến tranh du kích với chiến tranh chính quy.", "là những cuộc đấu tranh toàn diện với các thế lực ngoại xâm.", "nhận được sự ủng hộ của Liên Xô và các nước xã hội chủ nghĩa."], "correct": 1, "explain": "Điểm chung xuyên suốt là kết hợp đấu tranh vũ trang (du kích – chính quy) trong CMT8 và hai cuộc kháng chiến."}, {"q": "Nguyên nhân sâu xa bùng nổ các cuộc đấu tranh của nhân dân Việt Nam thời Bắc thuộc là", "options": ["ách cai trị, bóc lột nặng nề của chính quyền đô hộ phương Bắc.", "mâu thuẫn của các thủ lĩnh người Việt với chính quyền đô hộ.", "chính quyền đô hộ phương Bắc khủng hoảng, tổ chức lỏng lẻo.", "nhân dân Việt Nam đã thiết lập được chính quyền vững mạnh."], "correct": 0, "explain": "Nguyên nhân sâu xa là ách cai trị, bóc lột hà khắc của phong kiến phương Bắc."}, {"q": "Điều kiện tiên quyết đưa đến sự thành lập tổ chức ASEAN (1967) là các quốc gia thành viên", "options": ["có sự tương đồng về văn hóa.", "đều đã giành được độc lập.", "có sự đồng nhất về chính trị.", "có nền công nghiệp hiện đại."], "correct": 1, "explain": "Các nước phải giành được độc lập mới có tư cách chủ thể để cùng nhau lập tổ chức khu vực."}, {"q": "Từ đầu năm 1945 đến năm 1950, Chủ tịch Hồ Chí Minh gửi thư, công hàm cho Đại hội đồng Liên hợp quốc và Chính phủ một số nước nhằm khẳng định", "options": ["thắng lợi của Kháng chiến chống Mĩ, cứu nước ở Việt Nam.", "tính hợp pháp của thành quả cuộc Cách mạng tháng Tám (1945).", "tính hợp pháp của chế độ cộng hòa xã hội chủ nghĩa ở Việt Nam.", "mối quan hệ giữa Việt Nam với các tổ chức quốc tế toàn cầu."], "correct": 1, "explain": "Hồ Chí Minh gửi thư nhằm khẳng định tính hợp pháp, chính danh của nước Việt Nam Dân chủ Cộng hòa vừa ra đời."}, {"q": "Nhân tố chủ quan đưa đến thắng lợi của cuộc đấu tranh chống ngoại xâm, nội phản, bảo vệ chính quyền cách mạng sau ngày 2-9-1945 của Việt Nam là", "options": ["sự phát triển của phong trào giải phóng dân tộc thế giới.", "sự suy yếu của chủ nghĩa đế quốc sau chiến tranh thế giới.", "ý chí bảo vệ nền độc lập của toàn thể nhân dân Việt Nam.", "sự hình thành của hệ thống xã hội chủ nghĩa trên thế giới."], "correct": 2, "explain": "Nhân tố chủ quan là ý chí, quyết tâm bảo vệ độc lập của toàn dân (A, B, D đều là nhân tố khách quan)."}, {"q": "Nội dung nào sau đây chứng tỏ sự đột phá về tư duy lý luận của Đảng Cộng sản Việt Nam trong công cuộc đổi mới kinh tế đất nước (từ năm 1986 đến nay)?", "options": ["Chuyển từ việc xem thị trường là đặc trưng của tư bản chủ nghĩa sang việc thừa nhận đây là thành tựu chung của toàn bộ nền văn minh nhân loại.", "Chuyển từ việc giao phó toàn bộ nền kinh tế cho tư nhân sang việc nhà nước trực tiếp ấn định mức giá cả cho mọi mặt hàng tiêu dùng thiết yếu.", "Chuyển từ việc mở cửa hoàn toàn thị trường quốc tế sang việc đóng cửa biệt lập để bảo vệ các ngành công nghiệp quốc phòng non trẻ, kém phát triển.", "Chuyển từ việc áp dụng toàn diện các quy luật thị trường sang việc thiết lập hệ thống kiểm soát hành chính chặt chẽ đối với mọi giao dịch thương mại."], "correct": 0, "explain": "Đột phá tư duy: từ chỗ coi thị trường là đặc trưng của CNTB sang thừa nhận là thành tựu chung của nhân loại."}, {"q": "Theo đoạn tư liệu (New York Times, 9-5-1954), Hồ Chí Minh tạo được cảm tình với bạn bè quốc tế chủ yếu vì", "options": ["tham gia trực tiếp nhiều hội nghị quốc tế quan trọng.", "lãnh đạo công cuộc đổi mới đất nước ở Việt Nam.", "giữ vai trò lãnh đạo trong các tổ chức quốc tế lớn.", "Người có phong thái lịch thiệp, tính cách đáng kính."], "correct": 3, "explain": "Theo tư liệu, Người gây thiện cảm nhờ phong thái lịch thiệp, tính cách mạnh mẽ, đáng tôn kính."}, {"q": "Việc Hồ Chí Minh được Pháp công nhận là người phát ngôn đầu tiên của Việt Nam phản ánh", "options": ["sự công nhận của Pháp đối với công cuộc đổi mới ở Việt Nam.", "ảnh hưởng của Hồ Chí Minh trong phong trào công nhân Pháp.", "vai trò lãnh đạo các tổ chức quốc tế nổi bật của Hồ Chí Minh.", "vị thế đại diện cho tiếng nói của dân tộc Việt Nam trên thế giới."], "correct": 3, "explain": "Việc Pháp công nhận Người là “người phát ngôn đầu tiên của Việt Nam” thể hiện vị thế đại diện cho tiếng nói dân tộc."}, {"q": "Nội dung nào sau đây phản ánh đúng hình ảnh Hồ Chí Minh được đề cập trong đoạn tư liệu?", "options": ["Là nhà lãnh đạo quân sự tiêu biểu của phong trào giải phóng dân tộc châu Á.", "Là nhân vật có tầm ảnh hưởng lớn và được xem như biểu tượng của thời đại.", "Là chính khách nổi bật nhờ vai trò trong các hội nghị quốc tế ở Trung Đông.", "Là người đại diện chính thức của Việt Nam tại các tổ chức quốc tế, khu vực."], "correct": 1, "explain": "Tư liệu khắc họa Người như biểu tượng, nhân vật có tầm ảnh hưởng lớn của thời đại."}];
const PART2 = [{"context": "“Nhận thức về chủ nghĩa xã hội và con đường đi lên chủ nghĩa xã hội ngày càng sáng tỏ hơn; hệ thống quan điểm lý luận về công cuộc đổi mới, về xã hội xã hội chủ nghĩa và con đường đi lên chủ nghĩa xã hội ở Việt Nam đã hình thành trên những nét cơ bản.”\n(Đảng Cộng sản Việt Nam, Văn kiện Đại hội đại biểu toàn quốc lần thứ X, NXB Chính trị quốc gia, Hà Nội, 2006, tr.17)", "items": [{"text": "Sự hình thành hệ thống quan điểm lý luận về chủ nghĩa xã hội đã chứng tỏ Việt Nam đã hoàn thành mục tiêu xây dựng thành công chủ nghĩa xã hội trên thực tế.", "correct": false, "explain": "Sai – Tư liệu chỉ nói nhận thức lý luận rõ hơn, không có nghĩa đã “hoàn thành xây dựng CNXH trên thực tế”."}, {"text": "Nhận thức về chủ nghĩa xã hội và con đường đi lên chủ nghĩa xã hội ngày càng được làm rõ trong khi Việt Nam đã hoàn thành công cuộc Đổi mới đất nước.", "correct": false, "explain": "Sai – Đổi mới là quá trình liên tục, chưa từng được coi là “đã hoàn thành”."}, {"text": "Nhận thức về chủ nghĩa xã hội ngày càng sáng tỏ là do thực tiễn công cuộc đổi mới ở Việt Nam đã cung cấp cơ sở để Đảng từng bước hoàn thiện đường lối và lý luận phát triển đất nước.", "correct": true, "explain": "Đúng – Thực tiễn đổi mới chính là cơ sở để Đảng từng bước hoàn thiện đường lối, lý luận."}, {"text": "Hệ thống quan điểm lý luận về công cuộc đổi mới ở Việt Nam là sự phủ nhận hoàn toàn những nguyên lý cơ bản của chủ nghĩa Mác – Lênin trong quá trình xây dựng chủ nghĩa xã hội.", "correct": false, "explain": "Sai – Đổi mới là vận dụng, phát triển sáng tạo chủ nghĩa Mác – Lênin phù hợp thực tiễn, không phải “phủ nhận hoàn toàn”."}]}, {"context": "“Lần đầu tiên trong lịch sử, một nước thuộc địa nhỏ yếu đã đánh thắng một nước thực dân hùng mạnh. Đó là một thắng lợi vẻ vang của nhân dân Việt Nam, đồng thời cũng là một thắng lợi của các lực lượng hoà bình, dân chủ và xã hội chủ nghĩa trên thế giới”\n(Hồ Chí Minh, Toàn tập, Tập 10, NXB Chính trị Quốc gia, Hà Nội, 2002, tr.12)", "items": [{"text": "“Thắng lợi” được đề cập trong đoạn tư liệu là thắng lợi chung của các lực lượng tiến bộ trên thế giới vì phản ánh xu thế hòa hoãn, hợp tác và toàn cầu hóa.", "correct": false, "explain": "Sai – Xu thế hòa hoãn, hợp tác, toàn cầu hóa là đặc trưng của giai đoạn sau Chiến tranh lạnh, không liên quan bối cảnh 1954."}, {"text": "Bài học kinh nghiệm có thể rút ra từ “Thắng lợi” được đề cập trong đoạn tư liệu là kết hợp sức mạnh dân tộc với sức mạnh thời đại trong đấu tranh cách mạng.", "correct": true, "explain": "Đúng – Bài học “kết hợp sức mạnh dân tộc với sức mạnh thời đại” là bài học kinh điển rút ra từ thắng lợi này."}, {"text": "Chấm dứt hoàn toàn các cuộc chiến tranh xâm lược trên thế giới là ý nghĩa quốc tế của “thắng lợi” được đề cập trong đoạn tư liệu trên.", "correct": false, "explain": "Sai – Thắng lợi này cổ vũ phong trào giải phóng dân tộc chứ không “chấm dứt hoàn toàn” chiến tranh xâm lược trên thế giới."}, {"text": "“Thắng lợi” được đề cập trong đoạn tư liệu là Cách mạng tháng Tám năm 1945 ở Việt Nam.", "correct": false, "explain": "Sai – Đây là chiến thắng Điện Biên Phủ (đánh thắng Pháp), không phải Cách mạng tháng Tám (giành chính quyền từ tay Nhật/phong kiến)."}]}, {"context": "“Sau khi Liên Xô sụp đổ, không còn kẻ thù chung trực tiếp, sự cạnh tranh Mỹ - Tây Âu - Nhật Bản trở nên gay gắt, không chỉ diễn ra trong lĩnh vực kinh tế mà trong nhiều lĩnh vực khác với quy mô lớn hơn, toàn diện hơn. Chiến tranh lạnh kết thúc, Mỹ cho rằng đây là thời cơ mới để điều chỉnh chiến lược của mình, là thời cơ dùng sức mạnh chính trị, quân sự và kinh tế để thống trị, lãnh đạo thế giới, biến thế kỷ XXI thành thế kỷ Hoa Kỳ. Mỹ luôn khống chế, đe dọa các nước yếu, thao túng Liên hợp quốc, luôn lấy \"giá trị Mỹ\", \"tự do Mỹ\", \"nhân quyền Mỹ\" làm chuẩn mực áp đặt cho các nước khác. Để có thể trở thành siêu cường duy nhất trên thế giới, Mỹ tiếp tục khống chế Tây Âu và Nhật Bản.”\n(Nguyễn Đức Bình (Chủ biên), Những đặc điểm lớn của thế giới đương đại (Sách tham khảo), NXB Chính trị Quốc gia, Hà Nội, 2007, tr.86)", "items": [{"text": "Cạnh tranh Mỹ - Tây Âu - Nhật Bản sau Chiến tranh lạnh không chỉ giới hạn trong lĩnh vực kinh tế chủ yếu vì vai trò của các cường quốc trong khu vực bị suy giảm nghiêm trọng.", "correct": false, "explain": "Sai – Nguyên nhân cạnh tranh mở rộng không phải do “vai trò cường quốc khu vực suy giảm” mà do không còn kẻ thù chung sau khi Liên Xô sụp đổ."}, {"text": "Việc Mỹ muốn “biến thế kỷ XXI thành thế kỷ Hoa Kỳ” phản ánh tham vọng trong việc thiết lập trật tự đơn cực và nhu cầu bảo đảm được an ninh quốc gia trước các mối đe dọa mới.", "correct": false, "explain": "Sai – Tư liệu chỉ nói tham vọng thống trị, lãnh đạo thế giới; không đề cập “nhu cầu bảo đảm an ninh quốc gia trước mối đe dọa mới”."}, {"text": "Theo đoạn tư liệu, nguyên nhân trực tiếp khiến cạnh tranh giữa Mỹ - Tây Âu - Nhật Bản trở nên gay gắt sau Chiến tranh lạnh là xu thế toàn cầu hóa kinh tế diễn ra ngày càng sâu rộng.", "correct": false, "explain": "Sai – Tư liệu nêu rõ nguyên nhân trực tiếp là “không còn kẻ thù chung trực tiếp” (Liên Xô sụp đổ), không phải do toàn cầu hóa kinh tế."}, {"text": "Sự cạnh tranh giữa các nước tư bản chủ yếu sau Chiến tranh lạnh cho thấy xu thế hòa hoãn, hợp tác và cùng phát triển là xu thế chủ đạo, chi phối cục diện quan hệ quốc tế mới.", "correct": false, "explain": "Sai – Nội dung tư liệu nói về cạnh tranh, khống chế, áp đặt gay gắt, không phản ánh xu thế “hòa hoãn, hợp tác, cùng phát triển” là chủ đạo."}]}, {"context": "“Tháng 5/1941, Ban Chấp hành Trung ương Đảng họp Hội nghị lần thứ tám tại Pác Bó dưới sự chủ trì của lãnh tụ Nguyễn Ái Quốc. Hội nghị nhận định tính chất của cuộc chiến tranh thế giới và tiên đoán phe phát xít sẽ thất bại, phe Đồng minh sẽ thắng lợi.\nHội nghị xác định cách mạng Việt Nam là một bộ phận của cách mạng thế giới và trong giai đoạn hiện tại là một bộ phận của cuộc đấu tranh dân chủ chống phát xít. Nhiệm vụ cần kíp của cách mạng Việt Nam lúc đó là giải phóng dân tộc khỏi ách thống trị của đế quốc Pháp và phát xít Nhật, thành lập Mặt trận Việt Nam độc lập đồng minh, gọi tắt là Việt Minh.”\n(Vũ Dương Ninh, Lịch sử quan hệ đối ngoại Việt Nam (1940 - 2020), NXB Chính trị quốc gia sự thật, Hà Nội, 2021, tr. 62)", "items": [{"text": "Hội nghị Trung ương 8 (5/1941) được triệu tập trong bối cảnh Chiến tranh thế giới thứ hai diễn biến phức tạp, đặt ra yêu cầu cấp thiết phải điều chỉnh lại nhiệm vụ chiến lược của cách mạng Việt Nam.", "correct": true, "explain": "Đúng – Bối cảnh Nhật vào Đông Dương, chiến tranh thế giới phức tạp buộc Đảng phải điều chỉnh chiến lược."}, {"text": "Hội nghị Trung ương 8 (5/1941) là sự kiện đánh dấu việc Đảng Cộng sản Đông Dương chủ trương tạm gác nhiệm vụ giải phóng dân tộc để tập trung thực hiện nhiệm vụ dân chủ.", "correct": false, "explain": "Sai – Ngược lại, Hội nghị chủ trương đặt nhiệm vụ giải phóng dân tộc lên hàng đầu, tạm gác khẩu hiệu cách mạng ruộng đất (nhiệm vụ dân chủ)."}, {"text": "Hội nghị Trung ương 8 (5/1941) đã chứng tỏ Đảng Cộng sản Đông Dương đã hoàn thành mục tiêu giành độc lập dân tộc và thiết lập chính quyền cách mạng trên cả nước.", "correct": false, "explain": "Sai – Hội nghị mới xác định chủ trương, đường lối; việc giành độc lập, lập chính quyền trên cả nước là kết quả của Cách mạng tháng Tám (1945) sau đó."}, {"text": "Hội nghị Trung ương 8 (5/1941) đặt nhiệm vụ giải phóng dân tộc lên hàng đầu là do mâu thuẫn dân tộc trở nên gay gắt dưới ách thống trị của thực dân Pháp và phát xít Nhật.", "correct": true, "explain": "Đúng – Mâu thuẫn dân tộc gay gắt dưới ách thống trị của cả Pháp và Nhật chính là lý do đặt nhiệm vụ giải phóng dân tộc lên hàng đầu."}]}];

const quizEl = document.getElementById('quiz');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const scoreLabel = document.getElementById('scoreLabel');
const submitBtn = document.getElementById('submit-btn');
const restartBtn = document.getElementById('restart-btn');
const timerEl = document.getElementById('timer');

const TOTAL1 = PART1.length;
const TOTAL2 = PART2.length * 4;
const TOTAL = TOTAL1 + TOTAL2;

let answers1 = new Array(PART1.length).fill(null);
let answers2 = PART2.map(g => new Array(g.items.length).fill(null));
let submitted = false;

function countAnswered(){
  let c = answers1.filter(a => a !== null).length;
  answers2.forEach(g => { c += g.filter(a => a !== null).length; });
  return c;
}

function updateProgress(){
  const answered = countAnswered();
  const pct = (answered / TOTAL) * 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = answered + '/' + TOTAL + ' đã trả lời';
}

function render(){
  quizEl.innerHTML = '';

  const t1 = document.createElement('div');
  t1.className = 'section-title';
  t1.textContent = 'PHẦN I: TRẮC NGHIỆM NHIỀU LỰA CHỌN (Câu 1 - 24)';
  quizEl.appendChild(t1);

  PART1.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    const h3 = document.createElement('h3');
    h3.innerHTML = '<span class="qnum">Câu ' + (qi+1) + ':</span> ' + q.q;
    card.appendChild(h3);

    q.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      if(answers1[qi] === oi) label.classList.add('selected');

      const input = document.createElement('input');
      input.type = 'radio';
      input.name = 'p1q'+qi;
      input.value = oi;
      if(answers1[qi] === oi) input.checked = true;

      const span = document.createElement('span');
      const letter = String.fromCharCode(65+oi);
      span.textContent = letter + '. ' + opt;

      label.appendChild(input);
      label.appendChild(span);
      label.addEventListener('click', () => {
        if(submitted) return;
        answers1[qi] = oi;
        updateProgress();
        render();
      });
      card.appendChild(label);
    });

    const explain = document.createElement('div');
    explain.className = 'explain-box' + (submitted ? ' show' : '');
    explain.innerHTML = '<b>Giải thích:</b> ' + q.explain;
    card.appendChild(explain);

    quizEl.appendChild(card);
  });

  const t2 = document.createElement('div');
  t2.className = 'section-title';
  t2.textContent = 'PHẦN II: TRẮC NGHIỆM ĐÚNG - SAI (Câu 1 - 4)';
  quizEl.appendChild(t2);

  const letters = ['a','b','c','d'];
  PART2.forEach((group, gi) => {
    const card = document.createElement('div');
    card.className = 'tf-card';
    const h3 = document.createElement('h3');
    h3.style.color = '#fff';
    h3.style.margin = '0 0 10px';
    h3.textContent = 'Câu ' + (gi+1) + '. Cho đoạn tư liệu sau đây:';
    card.appendChild(h3);

    const ctx = document.createElement('div');
    ctx.className = 'context';
    ctx.textContent = group.context;
    card.appendChild(ctx);

    group.items.forEach((item, ii) => {
      const row = document.createElement('div');
      row.className = 'tf-item';

      const txt = document.createElement('div');
      txt.className = 'tf-text';
      txt.textContent = letters[ii] + ') ' + item.text;
      row.appendChild(txt);

      const btnWrap = document.createElement('div');
      btnWrap.className = 'tf-buttons';

      ['Đúng','Sai'].forEach((label, bi) => {
        const isTrueBtn = (bi === 0);
        const btn = document.createElement('div');
        btn.className = 'tf-btn';
        btn.textContent = label;
        const chosen = answers2[gi][ii];
        if(chosen === isTrueBtn) btn.classList.add('selected');
        btn.addEventListener('click', () => {
          if(submitted) return;
          answers2[gi][ii] = isTrueBtn;
          updateProgress();
          render();
        });
        btnWrap.appendChild(btn);
      });
      row.appendChild(btnWrap);

      if(submitted){
        const exp = document.createElement('div');
        exp.className = 'explain-box show';
        exp.style.marginTop = '8px';
        exp.innerHTML = '<b>' + (item.correct ? 'Đúng' : 'Sai') + '</b> – ' + item.explain.replace(/^(Đúng|Sai)\s*–\s*/, '');
        row.appendChild(exp);
      }

      card.appendChild(row);
    });

    quizEl.appendChild(card);
  });

  if(submitted){
    // Part 1 coloring
    document.querySelectorAll('.qcard').forEach((card, qi) => {
      const q = PART1[qi];
      const opts = card.querySelectorAll('.option');
      opts.forEach((el, oi) => {
        el.classList.add('disabled');
        el.classList.remove('selected');
        if(oi === q.correct){
          el.classList.add('correct');
        } else if(answers1[qi] === oi){
          el.classList.add('wrong');
        }
      });
    });
    // Part 2 coloring
    document.querySelectorAll('.tf-card').forEach((card, gi) => {
      const group = PART2[gi];
      const rows = card.querySelectorAll('.tf-item');
      rows.forEach((row, ii) => {
        const item = group.items[ii];
        const btns = row.querySelectorAll('.tf-btn');
        btns.forEach((btn, bi) => {
          btn.classList.add('disabled');
          btn.classList.remove('selected');
          const isTrueBtn = (bi === 0);
          if(isTrueBtn === item.correct){
            btn.classList.add('correct');
          } else if(answers2[gi][ii] === isTrueBtn){
            btn.classList.add('wrong');
          }
        });
      });
    });
  }
}

function grade(){
  let score1 = 0;
  answers1.forEach((a,i) => { if(a === PART1[i].correct) score1++; });
  let score2 = 0;
  answers2.forEach((g, gi) => {
    g.forEach((a, ii) => { if(a === PART2[gi].items[ii].correct) score2++; });
  });
  return {score1, score2, total: score1+score2};
}

const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xojoynke';
let quizStartTime = Date.now();

function formatTimeSpent(ms){
  const totalSec = Math.round(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec%60;
  return m + ' phút ' + s + ' giây';
}

function formatSubmittedNow(){
  const d = new Date();
  const hh = d.getHours().toString().padStart(2,'0');
  const mm = d.getMinutes().toString().padStart(2,'0');
  const dd = d.getDate();
  const mo = d.getMonth()+1;
  const yy = d.getFullYear();
  return hh + ':' + mm + ' ' + dd + '/' + mo + '/' + yy;
}

function submitViaHiddenIframe(fields){
  return new Promise((resolve) => {
    let iframe = document.getElementById('formspree-fallback-iframe');
    if(!iframe){
      iframe = document.createElement('iframe');
      iframe.id = 'formspree-fallback-iframe';
      iframe.name = 'formspree-fallback-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }
    const form = document.createElement('form');
    form.action = FORMSPREE_ENDPOINT;
    form.method = 'POST';
    form.target = 'formspree-fallback-iframe';
    form.style.display = 'none';
    Object.entries(fields).forEach(([k,v]) => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = k;
      input.value = v;
      form.appendChild(input);
    });
    document.body.appendChild(form);
    let done = false;
    iframe.onload = () => {
      if(done) return;
      done = true;
      form.remove();
      resolve(true);
    };
    form.submit();
    setTimeout(() => {
      if(done) return;
      done = true;
      form.remove();
      resolve(true);
    }, 4000);
  });
}

async function sendResultEmail(score1, score2, total, timeSpentMs){
  const statusEl = document.getElementById('emailStatus');
  statusEl.textContent = 'Đang gửi kết quả qua email...';
  statusEl.style.color = '#c7cdd6';

  const fields = {
    subject_name: 'Lịch sử - Đề số 61',
    score_part1: score1 + '/' + TOTAL1,
    score_part2: score2 + '/' + TOTAL2,
    total_score: total + '/' + TOTAL,
    time_spent: formatTimeSpent(timeSpentMs),
    submitted: formatSubmittedNow(),
    _subject: 'Kết quả đề Sử 61 - ' + total + '/' + TOTAL
  };

  try{
    const fd = new FormData();
    Object.entries(fields).forEach(([k,v]) => fd.append(k, v));
    const res = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: fd
    });
    if(res.ok){
      statusEl.innerHTML = '✔ Đã gửi kết quả về email!';
      statusEl.style.color = '#3fae5a';
      return;
    }
    throw new Error('HTTP ' + res.status);
  }catch(err){
    statusEl.textContent = 'Không gửi được trực tiếp, đang thử cách khác...';
    try{
      await submitViaHiddenIframe(fields);
      statusEl.innerHTML = '✔ Đã gửi yêu cầu kết quả (phương án dự phòng). Kiểm tra email trong vài phút.';
      statusEl.style.color = '#3fae5a';
    }catch(err2){
      statusEl.innerHTML = '⚠ Không thể gửi email tự động. <button id="retryEmailBtn" style="text-decoration:underline;background:none;border:none;color:#f4c531;cursor:pointer;padding:0;font-size:0.78rem;">Thử lại</button>';
      statusEl.style.color = '#d9534f';
      const retryBtn = document.getElementById('retryEmailBtn');
      if(retryBtn){
        retryBtn.addEventListener('click', () => sendResultEmail(score1, score2, total, timeSpentMs));
      }
    }
  }
}

submitBtn.addEventListener('click', () => {
  submitted = true;
  const {score1, score2, total} = grade();
  const timeSpentMs = Date.now() - quizStartTime;
  scoreLabel.textContent = 'Điểm: Phần I ' + score1 + '/' + TOTAL1 + ' · Phần II ' + score2 + '/' + TOTAL2 + ' · Tổng ' + total + '/' + TOTAL;
  submitBtn.style.display = 'none';
  restartBtn.style.display = 'inline-block';
  render();
  clearInterval(timerInterval);
  sendResultEmail(score1, score2, total, timeSpentMs);
  window.scrollTo({top:0, behavior:'smooth'});
});

restartBtn.addEventListener('click', () => {
  answers1 = new Array(PART1.length).fill(null);
  answers2 = PART2.map(g => new Array(g.items.length).fill(null));
  submitted = false;
  submitBtn.style.display = 'inline-block';
  submitBtn.disabled = false;
  restartBtn.style.display = 'none';
  scoreLabel.textContent = 'Điểm: Phần I 0/' + TOTAL1 + ' · Phần II 0/' + TOTAL2 + ' · Tổng 0/' + TOTAL;
  document.getElementById('emailStatus').textContent = '';
  quizStartTime = Date.now();
  updateProgress();
  render();
  startTimer(45*60);
  window.scrollTo({top:0, behavior:'smooth'});
});

// Timer
let timerInterval;
function startTimer(seconds){
  let remaining = seconds;
  updateTimerDisplay(remaining);
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remaining--;
    if(remaining <= 0){
      remaining = 0;
      updateTimerDisplay(remaining);
      clearInterval(timerInterval);
      if(!submitted) submitBtn.click();
      return;
    }
    updateTimerDisplay(remaining);
  }, 1000);
}
function updateTimerDisplay(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const ss = (s%60).toString().padStart(2,'0');
  timerEl.textContent = m + ':' + ss;
}

// Snow decoration - smooth continuous falling snowflakes
const snowLayer = document.getElementById('snow-layer');
const flakeChars = ['❋','❄','❅','❆','✻'];
for(let i=0;i<24;i++){
  const flake = document.createElement('div');
  flake.className = 'snowflake';
  flake.textContent = flakeChars[Math.floor(Math.random()*flakeChars.length)];
  flake.style.left = Math.random()*100 + '%';
  flake.style.fontSize = (10 + Math.random()*12) + 'px';
  flake.style.opacity = (0.2 + Math.random()*0.5).toFixed(2);
  const duration = 10 + Math.random()*14;
  flake.style.animationDuration = duration + 's';
  flake.style.animationDelay = (-Math.random()*duration) + 's';
  snowLayer.appendChild(flake);
}

render();
updateProgress();
startTimer(45*60);
</script>
